<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simulação de Interface</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #121212;
            overflow: hidden;
            position: relative;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            user-select: none;
            touch-action: none;
        }

        /* Desenho do Círculo do FOV na tela (por cima do painel) */
        #circuloFov {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px dashed #a020f0;
            background-color: rgba(160, 32, 240, 0.05);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5; /* Garante que fica por cima do painel */
        }

        /* Tela de Validação Inicial */
        .login-container {
            display: none; 
            width: 320px;
            background-color: #000000;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            z-index: 20;
        }

        .login-container h2 {
            margin-top: 0;
            color: #a020f0;
            font-size: 20px;
            letter-spacing: 1px;
        }

        .login-input {
            width: 90%;
            padding: 10px;
            margin: 15px 0;
            background-color: #1a1a1a;
            border: 1px solid #444;
            border-radius: 4px;
            color: white;
            text-align: center;
            outline: none;
            font-size: 16px;
        }

        .login-btn {
            background-color: #a020f0;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .error-msg {
            color: #ff3333;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }

        /* Container Principal do Menu */
        .menu-container {
            display: none; 
            width: 420px;
            background-color: #000000;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            z-index: 2; /* Fica logo abaixo do círculo do FOV */
        }

        .header {
            background-color: #a020f0;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
        }

        .close-btn {
            cursor: pointer;
        }

        /* Painel com Rolagem Integrada */
        .content-panel {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 320px;
            overflow-y: auto;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            cursor: pointer;
        }

        .checkbox-custom {
            width: 16px;
            height: 16px;
            background-color: #a020f0;
            border-radius: 3px;
        }

        .checkbox-custom.off {
            background-color: #1a1a1a;
            border: 1px solid #333;
        }

        .fov-box {
            background-color: #a020f0;
            border-radius: 4px;
            padding: 6px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .fov-display {
            font-weight: bold;
            font-size: 14px;
        }

        .fov-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            outline: none;
        }

        .fov-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
        }

        .fov-label {
            font-size: 13px;
        }

        .selection-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            background-color: #0a0a0a;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #222;
        }

        .select-input {
            background-color: #1a1a1a;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 4px 8px;
            outline: none;
            font-size: 12px;
            cursor: pointer;
        }

        .ff-launch-btn {
            width: 100%;
            background-color: #ff4500;
            color: white;
            border: none;
            padding: 10px;
            font-weight: bold;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-decoration: none;
            display: block;
            text-align: center;
            box-sizing: border-box;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="circuloFov"></div>

    <div class="login-container" id="telaLogin">
        <h2>COMPLEXO XITS</h2>
        <input type="text" class="login-input" id="senhaInput" placeholder="Digite a Chave" autocomplete="off">
        <br>
        <button type="button" class="login-btn" onclick="verificarSenha()">Entrar</button>
        <div class="error-msg" id="erroMsg">Chave inválida.</div>
    </div>

    <div class="menu-container" id="meuMenu">
        <div class="header">
            <span>▼ COMPLEXO XITS - @menu.design</span>
            <div class="close-btn" onclick="fecharTudo()">X</div>
        </div>

        <div class="content-panel">
            <div class="checkbox-group" onclick="toggleCheck(this)">
                <div class="checkbox-custom off"></div>
                <span>Ativar Aimbot</span>
            </div>
            <div class="checkbox-group" onclick="toggleCheck(this)">
                <div class="checkbox-custom off"></div>
                <span>Puxar em Paredes</span>
            </div>
            <div class="checkbox-group" onclick="toggleFovVisivel(this)">
                <div class="checkbox-custom off" id="chkExibirFov"></div>
                <span>Exibir FOV</span>
            </div>
            <div class="checkbox-group" onclick="toggleCheck(this)">
                <div class="checkbox-custom off"></div>
                <span>Exibir Linha</span>
            </div>

            <div class="fov-box">
                <div class="fov-display" id="fovNum">250.0</div>
                <input type="range" class="fov-slider" min="50" max="500" step="1" value="250" oninput="ajustarFov(this.value)">
            </div>
            <div class="fov-label">
                <span>Regular FOV</span>
            </div>

            <div class="selection-row">
                <span>Região da Puxada:</span>
                <select class="select-input">
                    <option value="cabeca">Cabeça</option>
                    <option value="pescoco">Pescoço</option>
                    <option value="peito">Peito</option>
                    <option value="pe">Pé</option>
                </select>
            </div>

            <div class="checkbox-group" onclick="toggleCheck(this)">
                <div class="checkbox-custom off"></div>
                <span>Auxílio Dpi Fix</span>
            </div>
            <div class="checkbox-group" onclick="toggleCheck(this)">
                <div class="checkbox-custom off"></div>
                <span>Suavizar Visada</span>
            </div>
            <div class="checkbox-group" onclick="toggleCheck(this)">
                <div class="checkbox-custom off"></div>
                <span>Prender Mira Hipfire</span>
            </div>
            <div class="checkbox-group" onclick="toggleCheck(this)">
                <div class="checkbox-custom off"></div>
                <span>Otimizar Sensibilidade</span>
            </div>
            <div class="checkbox-group" onclick="toggleCheck(this)">
                <div class="checkbox-custom off"></div>
                <span>Anti-Dispersão</span>
            </div>
            <div class="checkbox-group" onclick="toggleCheck(this)">
                <div class="checkbox-custom off"></div>
                <span>Estabilizador Red Dot</span>
            </div>

            <a href="android-app://com.dts.freefireth" class="ff-launch-btn">Abrir Free Fire</a>
        </div>
    </div>

    <script>
        const menu = document.getElementById('meuMenu');
        const login = document.getElementById('telaLogin');
        const senhaInput = document.getElementById('senhaInput');
        const erroMsg = document.getElementById('erroMsg');
        const circuloFov = document.getElementById('circuloFov');
        let autenticado = false;
        let fovAtivo = false;

        function dispararGestoAtivacao() {
            if (!autenticado) {
                if (login.style.display === 'block') {
                    login.style.display = 'none';
                } else {
                    login.style.display = 'block';
                    erroMsg.style.display = 'none';
                    setTimeout(() => senhaInput.focus(), 50);
                }
            } else {
                if (menu.style.display === 'block') {
                    menu.style.display = 'none';
                } else {
                    menu.style.display = 'block';
                }
            }
        }

        senhaInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                verificarSenha();
            }
        });

        window.addEventListener('keydown', function(event) {
            if (event.key === 'Alt') {
                event.preventDefault();
                dispararGestoAtivacao();
            }
        });

        window.addEventListener('touchstart', function(e) {
            if (e.touches.length === 4) {
                e.preventDefault();
                dispararGestoAtivacao();
            }
        }, { passive: false });

        function verificarSenha() {
            const senha = senhaInput.value.trim();
            if (senha === 'cpx' || senha === 'CPX' || senha === 'Cpx') {
                autenticado = true;
                login.style.display = 'none';
                menu.style.display = 'block'; 
                ajustarFov(document.getElementById('fovNum').innerText);
            } else {
                erroMsg.style.display = 'block';
            }
        }

        function fecharTudo() {
            menu.style.display = 'none';
            login.style.display = 'none';
        }

        function ajustarFov(valor) {
            document.getElementById('fovNum').innerText = parseFloat(valor).toFixed(1);
            circuloFov.style.width = valor + 'px';
            circuloFov.style.height = valor + 'px';
        }

        function toggleFovVisivel(elemento) {
            const caixa = elemento.querySelector('.checkbox-custom');
            caixa.classList.toggle('off');
            fovAtivo = !caixa.classList.contains('off');
            circuloFov.style.display = fovAtivo ? 'block' : 'none';
        }

        function toggleCheck(elemento) {
            const caixa = elemento.querySelector('.checkbox-custom');
            caixa.classList.toggle('off');
        }
    </script>
</body>
</html>
